<!doctype html>
<html lang="pt-BR">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <meta name="description" content="MMA Analytics by RFT — Plataforma de scouting com perfis de atletas, rankings, predições e relatórios técnicos." />
    <link rel="icon" type="image/png" href="imagens/rft-losango.png" />
    <link rel="apple-touch-icon" href="imagens/rft-losango.png" />
    <title>MMA Analytics by RFT — Scouting & Predições</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800;900&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script>
      // SPA deep-link restore (pareado com 404.html de GH Pages)
      (function () {
        var saved = sessionStorage.getItem("spa-redirect-path");
        if (saved) {
          sessionStorage.removeItem("spa-redirect-path");
          if (saved !== location.pathname + location.search + location.hash) {
            history.replaceState(null, "", saved);
          }
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>

</html>
