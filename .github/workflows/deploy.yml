name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (GitHub Pages base path)
        env:
          # Repo path no GitHub Pages: dbbatalha.github.io/rft-monorepo/
          SITE_BASE: /rft-monorepo/
        run: |
          pnpm --filter @rft/site-frontend build
          pnpm --filter @rft/analytics-frontend build

          # Remove WASM gerado pelo bundler — usamos CDN em runtime
          rm -f apps/analytics/frontend/dist/assets/ort-wasm-*.wasm

          # Monta dist/ unificado
          rm -rf dist
          mkdir -p dist
          cp -R apps/site/frontend/dist/. dist/
          mkdir -p dist/analytics
          cp -R apps/analytics/frontend/dist/. dist/analytics/

          # GitHub Pages SPA fallback: 404.html inteligente que detecta
          # se o path é do site (/rft-monorepo/...) ou do analytics
          # (/rft-monorepo/analytics/...), salva o path em sessionStorage
          # e redireciona pra raiz do SPA correto. O index.html de cada
          # SPA tem um script que lê o sessionStorage e restaura a URL via
          # history.replaceState antes do main.tsx montar a app.
          cat > dist/404.html <<'HTML'
          <!doctype html>
          <html lang="pt-BR">
            <head>
              <meta charset="UTF-8" />
              <title>RFT</title>
              <script>
                (function () {
                  var siteBase = "/rft-monorepo/";
                  var analyticsBase = "/rft-monorepo/analytics/";
                  var path = location.pathname;
                  var target = path.indexOf(analyticsBase) === 0 ? analyticsBase : siteBase;
                  sessionStorage.setItem("spa-redirect-path", path + location.search + location.hash);
                  location.replace(target);
                })();
              </script>
            </head>
            <body></body>
          </html>
          HTML

          # Mesmo 404.html no /analytics/ (alguns hosts honram 404.html
          # do subdiretório; em GH Pages só vale o da raiz, mas não custa)
          cp dist/404.html dist/analytics/404.html

          # Bypass Jekyll (evita o GH Pages tentar processar como Jekyll)
          touch dist/.nojekyll

          du -sh dist

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
